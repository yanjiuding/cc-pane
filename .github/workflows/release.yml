name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Validate package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Validate tauri.conf.json version
        run: |
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAURI_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::tauri.conf.json version ($TAURI_VERSION) does not match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Validate Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    needs: validate-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: windows-latest
            args: --bundles nsis
          - platform: windows-latest
            label: windows-arm64
            args: --bundles nsis --target aarch64-pc-windows-msvc
            rust_target: aarch64-pc-windows-msvc
          - platform: macos-latest
            label: macos-arm64
            args: --bundles app,dmg
          - platform: macos-latest
            label: macos-x86_64
            args: --bundles app,dmg --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-24.04
            label: linux-amd64
            args: --bundles deb appimage
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 45
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libgtk-3-dev patchelf libpipewire-0.3-dev libgbm-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.label }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.label }}-cargo-release-

      - name: Install dependencies
        run: npm ci

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "CC-Panes v__VERSION__"
          releaseBody: |
            See the [CHANGELOG](https://github.com/wuxiran/cc-pane/blob/main/CHANGELOG.md) for details.

            ---

            ## macOS 安装说明

            由于应用未经 Apple 签名，macOS 可能提示"文件已损坏"或"无法验证开发者"。请使用以下任一方式解决：

            **方式一：终端命令（推荐）**
            ```bash
            xattr -cr /Applications/CC-Panes.app
            ```

            **方式二：右键打开**
            在 Finder 中按住 Control 键点击（或右键点击）应用图标，选择"打开"，在弹出的对话框中点击"打开"。

            **方式三：系统设置**
            打开"系统设置 → 隐私与安全性"，在底部找到被阻止的应用，点击"仍要打开"。

            ## Linux 安装说明

            **Deb 包（Ubuntu/Debian）：**
            ```bash
            sudo dpkg -i cc-panes_*.deb
            sudo apt-get install -f  # 安装缺少的依赖
            ```

            **AppImage：**
            ```bash
            chmod +x cc-panes_*.AppImage
            ./cc-panes_*.AppImage
            ```
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
