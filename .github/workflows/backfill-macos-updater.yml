name: Backfill macOS Updater Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to backfill, for example v0.9.40
        required: true
        default: v0.9.40

permissions:
  contents: write

jobs:
  build-macos-updater:
    name: Build macOS updater (${{ matrix.label }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            platform_key: darwin-aarch64
            asset_arch: aarch64
            args: --bundles app
          - label: macos-x86_64
            platform_key: darwin-x86_64
            asset_arch: x64
            args: --bundles app --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies
        run: npm ci

      - name: Build updater app bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Prepare metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          version="${tag#v}"
          archive="$(find src-tauri/target -path '*/bundle/macos/*.app.tar.gz' -type f | head -n 1)"
          signature="${archive}.sig"
          if [[ ! -f "$archive" || ! -f "$signature" ]]; then
            echo "macOS updater archive or signature was not generated" >&2
            find src-tauri/target -type f | grep '/bundle/' | sort >&2 || true
            exit 1
          fi

          asset="cc-panes_${version}_${{ matrix.asset_arch }}.app.tar.gz"
          sig_asset="${asset}.sig"
          cp "$archive" "$asset"
          cp "$signature" "$sig_asset"

          signature_body="$(cat "$sig_asset")"
          {
            echo "platform_key=${{ matrix.platform_key }}"
            echo "asset=$asset"
            echo "sig_asset=$sig_asset"
            echo "signature<<EOF"
            echo "$signature_body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload macOS updater assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag }}" \
            "${{ steps.metadata.outputs.asset }}" \
            "${{ steps.metadata.outputs.sig_asset }}" \
            --clobber

      - name: Write platform metadata
        run: |
          mkdir -p metadata
          cat > "metadata/${{ matrix.platform_key }}.json" <<'JSON'
          {
            "platformKey": "${{ steps.metadata.outputs.platform_key }}",
            "asset": "${{ steps.metadata.outputs.asset }}",
            "signature": ${{ toJSON(steps.metadata.outputs.signature) }}
          }
          JSON

      - name: Upload platform metadata
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform_key }}
          path: metadata/${{ matrix.platform_key }}.json

  update-latest-json:
    name: Update latest.json
    runs-on: ubuntu-latest
    needs: build-macos-updater
    steps:
      - name: Download platform metadata
        uses: actions/download-artifact@v4
        with:
          path: metadata

      - name: Download current latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ inputs.tag }}" --pattern latest.json --dir current

      - name: Merge macOS updater platforms
        env:
          TAG: ${{ inputs.tag }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const latestPath = path.join("current", "latest.json");
          const latest = JSON.parse(fs.readFileSync(latestPath, "utf8"));
          latest.platforms ??= {};

          for (const dir of fs.readdirSync("metadata")) {
            const metadataPath = path.join("metadata", dir, `${dir}.json`);
            if (!fs.existsSync(metadataPath)) continue;
            const entry = JSON.parse(fs.readFileSync(metadataPath, "utf8"));
            const url = `https://github.com/wuxiran/cc-pane/releases/download/${process.env.TAG}/${entry.asset}`;
            latest.platforms[entry.platformKey] = { signature: entry.signature, url };
            latest.platforms[`${entry.platformKey}-app`] = { signature: entry.signature, url };
          }

          fs.writeFileSync(latestPath, `${JSON.stringify(latest, null, 2)}\n`);
          NODE

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ inputs.tag }}" current/latest.json --clobber
